version: "3.9"

services:
  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
